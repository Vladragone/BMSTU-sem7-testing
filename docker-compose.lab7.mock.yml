services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: game_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  weather-mock:
    image: wiremock/wiremock:3.9.2
    ports:
      - "8081:8080"
    volumes:
      - ./project-root/mock/weather:/home/wiremock

  app:
    build:
      context: ./project-root
      dockerfile: Dockerfile.app
    depends_on:
      db:
        condition: service_healthy
      weather-mock:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/game_test
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SERVER_ADDRESS: 0.0.0.0
      EXTERNAL_WEATHER_MODE: mock
      EXTERNAL_WEATHER_MOCK_BASE_URL: http://weather-mock:8080
      EXTERNAL_WEATHER_REAL_BASE_URL: https://api.open-meteo.com
    ports:
      - "8080:8080"
