spring.datasource.url=jdbc:postgresql://${TEST_DB_HOST:localhost}:${TEST_DB_PORT:5433}/${TEST_DB_NAME:game_test}
spring.datasource.username=${TEST_DB_USER:postgres}
spring.datasource.password=${TEST_DB_PASS:postgres}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.sql.init.mode=never
server.port=0
tracing.enabled=${TRACING_ENABLED:false}
tracing.otlp.endpoint=${TRACING_OTLP_ENDPOINT:http://localhost:4317}
tracing.service-name=${TRACING_SERVICE_NAME:game-tests}
tracing.sample-ratio=${TRACING_SAMPLE_RATIO:1.0}
tracing.exporter=${TRACING_EXPORTER:logging}
external.weather.mode=${EXTERNAL_WEATHER_MODE:mock}
external.weather.real-base-url=${EXTERNAL_WEATHER_REAL_BASE_URL:https://api.open-meteo.com}
external.weather.mock-base-url=${EXTERNAL_WEATHER_MOCK_BASE_URL:http://localhost:8081}
external.weather.connect-timeout-ms=${EXTERNAL_WEATHER_CONNECT_TIMEOUT_MS:3000}
external.weather.read-timeout-ms=${EXTERNAL_WEATHER_READ_TIMEOUT_MS:3000}
