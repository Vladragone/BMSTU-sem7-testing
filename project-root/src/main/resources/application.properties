spring.datasource.url=jdbc:postgresql://localhost:5433/postgres
spring.datasource.username=postgres
spring.datasource.password=123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.devtools.restart.enabled=true
logging.level.org.springframework.web=ERROR
logging.level.com.example.game=ERROR
logging.level.org.hibernate=ERROR
logging.pattern.level=%5p [trace_id=%X{trace_id:-},span_id=%X{span_id:-}]
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
server.port=8080
server.address=127.0.0.1
tracing.enabled=${TRACING_ENABLED:false}
tracing.otlp.endpoint=${TRACING_OTLP_ENDPOINT:http://localhost:4317}
tracing.service-name=${TRACING_SERVICE_NAME:game-app}
tracing.sample-ratio=${TRACING_SAMPLE_RATIO:1.0}
tracing.exporter=${TRACING_EXPORTER:otlp}
external.weather.mode=${EXTERNAL_WEATHER_MODE:real}
external.weather.real-base-url=${EXTERNAL_WEATHER_REAL_BASE_URL:https://api.open-meteo.com}
external.weather.mock-base-url=${EXTERNAL_WEATHER_MOCK_BASE_URL:http://localhost:8081}
external.weather.connect-timeout-ms=${EXTERNAL_WEATHER_CONNECT_TIMEOUT_MS:3000}
external.weather.read-timeout-ms=${EXTERNAL_WEATHER_READ_TIMEOUT_MS:3000}
